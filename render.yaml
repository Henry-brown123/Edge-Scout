services:
  - type: web
    name: edge-scout
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: API_SPORTS_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
    disk:
      name: edge-scout-data
      mountPath: /data
      sizeGB: 1
